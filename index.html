<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>十大知识域 · 记忆卡</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px 8px;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 36px 36px 24px 24px;
            box-shadow: 0 10px 30px rgba(0, 20, 30, 0.2);
            overflow: hidden;
            padding: 20px 16px 30px;
            margin: auto;
        }

        .header {
            margin-bottom: 18px;
            padding: 0 4px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(145deg, #0b3b5c, #1e5a7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .subhead {
            color: #3a546d;
            font-size: 0.9rem;
            font-weight: 400;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .filter-area {
            background: #e9eff5;
            border-radius: 40px;
            padding: 6px 16px 6px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 8px 0 20px;
        }

        .filter-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #0f2b3b;
        }

        select {
            background: white;
            border: none;
            padding: 10px 24px 10px 16px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #0b3b5c;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%231e5a7a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            width: 180px;
            cursor: pointer;
        }

        .card-progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0 8px;
            padding: 0 4px;
        }

        .progress-text {
            background: #d9e2ec;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #103a50;
        }

        .random-btn {
            background: none;
            border: none;
            background-color: #d4e0ea;
            width: 46px;
            height: 46px;
            border-radius: 40px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0b3b5c;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.2s;
        }

        .random-btn:active {
            background-color: #b6c9db;
            transform: scale(0.96);
        }

        .flashcard {
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0, 30, 50, 0.15);
            padding: 24px 18px;
            margin: 8px 0 20px;
            border: 1px solid #cbd5e1;
        }

        .card-badge {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .area-tag {
            background: #0b3b5c;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .category-tag {
            background: #f0c38e;
            color: #2c1f0f;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .process-name {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 12px 0 10px;
            color: #0a1c2b;
            word-break: break-word;
        }

        .detail-section {
            background: #f8fafc;
            border-radius: 24px;
            padding: 18px 14px;
            margin-top: 16px;
            border-left: 4px solid #6b8ea0;
        }

        .detail-item {
            margin-bottom: 16px;
        }

        .detail-item:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #2f5972;
            margin-bottom: 6px;
        }

        .detail-content {
            font-size: 1rem;
            line-height: 1.5;
            color: #1e2e3b;
            word-break: break-word;
            white-space: pre-line;
        }

        .detail-content ul {
            list-style-type: disc;
            padding-left: 20px;
            margin-top: 5px;
        }

        .detail-content li {
            margin-bottom: 4px;
        }

        .hidden-detail {
            display: none;
        }

        .action-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 8px 0 12px;
        }

        .nav-btn {
            flex: 1;
            background: #e9eff5;
            border: none;
            padding: 16px 0;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1d4a67;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-btn:active {
            background: #cfdeed;
        }

        .reveal-btn {
            width: 100%;
            background: white;
            border: 2px solid #6b8ea0;
            color: #1d4a67;
            font-weight: 600;
            padding: 16px;
            border-radius: 60px;
            font-size: 1.2rem;
            margin-top: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: #eef5fa;
        }

        .reveal-btn:active {
            background: #d7e4f0;
            border-color: #2b5e7a;
        }

        .footer-note {
            text-align: center;
            color: #5b7991;
            font-size: 0.8rem;
            margin-top: 28px;
            opacity: 0.7;
        }

        .icon {
            font-size: 1.3rem;
        }

        /* 适应极窄小屏 */
        @media (max-width: 380px) {
            .process-name { font-size: 1.5rem; }
            .filter-area { flex-wrap: wrap; gap: 8px; }
            select { width: 100%; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>📘 项目管理·记忆卡</h1>
        <div class="subhead">
            <span>十大知识域 · 五大过程组</span>
            <span>🏷️ 描述+作用</span>
        </div>
    </div>

    <!-- 知识域筛选 -->
    <div class="filter-area">
        <span class="filter-label">📂 知识域</span>
        <select id="areaSelect"></select>
    </div>

    <!-- 进度&随机 -->
    <div class="card-progress">
        <span class="progress-text" id="progressIndicator">0/0</span>
        <button class="random-btn" id="randomBtn" title="随机卡片">🎲</button>
    </div>

    <!-- 卡片主体 -->
    <div class="flashcard" id="flashcard">
        <div class="card-badge">
            <span class="area-tag" id="cardArea">整合管理</span>
            <span class="category-tag" id="cardCategory">启动</span>
        </div>
        <div class="process-name" id="cardProcess">制定项目章程</div>

        <!-- 详细描述和作用 (默认隐藏) -->
        <div id="detailSection" class="detail-section hidden-detail">
            <div class="detail-item">
                <div class="detail-label">📝 描述</div>
                <div class="detail-content" id="cardDesc"></div>
            </div>
            <div class="detail-item">
                <div class="detail-label">🎯 作用</div>
                <div class="detail-content" id="cardEffect"></div>
            </div>
        </div>

        <!-- 显示/隐藏按钮 -->
        <button class="reveal-btn" id="toggleDetailBtn">🔎 显示描述&作用</button>
    </div>

    <!-- 上下导航 -->
    <div class="action-buttons">
        <button class="nav-btn" id="prevBtn"><span class="icon">◀</span> 上一个</button>
        <button class="nav-btn" id="nextBtn">下一个 <span class="icon">▶</span></button>
    </div>

    <div class="footer-note">
        👆 点击按钮显示答案 · 按知识域筛选 · 随机抽取
    </div>
</div>

        { area: "风险管理", process: "识别风险", category: "规划", desc: "识别单个项目风险以及整体项目风险的来源，并记录风险特征的过程", effect: "1. 记录现有的单个项目风险，以及整体项目风险的来源\n2. 汇总相关信息，以便项目团队能够恰当地应对已识别的风险" },
        { area: "风险管理", process: "实施定性风险分析", category: "规划", desc: "通过评估单个项目风险发生的概率和影响及其特征，对风险进行优先级排序，从而为后续分析或行动提供基础的过程", effect: "重点关注高优先级的风险" },
        { area: "风险管理", process: "实施定量风险分析", category: "规划", desc: "就已识别的单个风险和不确定性的其他来源对整体项目目标的影响进行定量分析的过程", effect: "1. 量化整体项目风险最大可能性\n2. 提供额外的定量风险信息，以支持风险应对规划" },
        { area: "风险管理", process: "规划风险应对", category: "规划", desc: "为了应对项目风险，而制定可选方案、选择应对策略并商定应对行动的过程", effect: "1.制定应对整体项目风险和单个风险的适当方法\n2.分配资源，并根据需要将相关活动添加进项目文件和项目管理计划中。" },
        { area: "风险管理", process: "实施风险应对", category: "执行", desc: "执行商定的风险应对计划的过程", effect: "1. 确保按计划执行商定的风险应对措施\n2. 管理整体项目风险，最小化单个项目威胁，以及最大化单个项目机会" },
        { area: "风险管理", process: "监督风险", category: "监控", desc: "在整个项目期间，监督风险应对计划的实施，并跟踪已识别风险、识别和分析新风险，以及评估风险管理有效性的过程", effect: "保证项目决策是在整体项目风险和单个项目风险当前信息的基础上进行。" },
        // 采购管理 (3)
        { area: "采购管理", process: "规划采购管理", category: "规划", desc: "记录项目采购决策、明确采购方法，及识别潜在卖方的过程", effect: "确定是否从项目外部获取货物和服务，如果是，则还要确定将在什么时间、以什么方式获取什么货物和服务。" },
        { area: "采购管理", process: "实施采购", category: "执行", desc: "获取卖方应答、选择卖方并授予合同的过程", effect: "选定合格卖方并签署关于货物或服务交付的法律协议" },
        { area: "采购管理", process: "控制采购", category: "监控", desc: "管理采购关系、监督合同绩效、实施必要的变更和纠偏，以及关闭合同的过程", effect: "确保买卖双方履行法律协议，满足项目需求" },
        // 干系人管理 (4)
        { area: "干系人管理", process: "识别干系人", category: "启动", desc: "定期识别项目干系人，分析和记录他们的利益、参与度、相互依赖性、影响力和对项目成功的潜在影响的过程", effect: "使项目团队能够建立对每个干系人或干系人群体的适度关注" },
        { area: "干系人管理", process: "规划干系人参与", category: "规划", desc: "根据干系人的需求、期望、利益和对项目的潜在影响，制定项目干系人参与项目的方法的过程", effect: "提供与干系人进行有效互动的可行计划" },
        { area: "干系人管理", process: "管理干系人参与", category: "执行", desc: "通过与干系人进行沟通协作，以满足其需求与期望、处理问题，并促进干系人合理参与的过程", effect: "尽可能提高干系人的支持度，并降低干系人的抵制程度" },
        { area: "干系人管理", process: "监督干系人参与", category: "监控", desc: "监督项目干系人的关系，并通过修订参与策略和计划来引导干系人合理参与项目的过程", effect: "随着项目进展和环境变化，维持或提升干系人参与活动的效率和效果" }
    ];

    // 获取所有知识域（去重）
    const allAreas = [...new Set(cardsData.map(c => c.area))].sort();

    // ---------- DOM 元素 ----------
    const areaSelect = document.getElementById('areaSelect');
    const progressSpan = document.getElementById('progressIndicator');
    const cardArea = document.getElementById('cardArea');
    const cardCategory = document.getElementById('cardCategory');
    const cardProcess = document.getElementById('cardProcess');
    const cardDesc = document.getElementById('cardDesc');
    const cardEffect = document.getElementById('cardEffect');
    const detailSection = document.getElementById('detailSection');
    const toggleBtn = document.getElementById('toggleDetailBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const randomBtn = document.getElementById('randomBtn');

    // 状态变量
    let currentFilter = '全部';          // 当前选中的知识域
    let filteredCards = cardsData.slice(); // 当前过滤后的数组
    let currentIndex = 0;                // 在当前过滤数组中的索引
    let detailVisible = false;            // 描述/作用是否显示

    // ---------- 初始化下拉框 ----------
    function populateSelect() {
        let options = '<option value="全部">🔽 全部知识域</option>';
        allAreas.forEach(area => {
            options += `<option value="${area}">📌 ${area}</option>`;
        });
        areaSelect.innerHTML = options;
    }
    populateSelect();

    // ---------- 根据过滤条件更新filteredCards和currentIndex ----------
    function updateFilteredCards() {
        if (currentFilter === '全部') {
            filteredCards = cardsData.slice();
        } else {
            filteredCards = cardsData.filter(c => c.area === currentFilter);
        }
        // 重置索引为0，并重置隐藏状态
        currentIndex = filteredCards.length > 0 ? 0 : -1;
        detailVisible = false;  // 新过滤默认隐藏详情
    }

    // ---------- 渲染当前卡片 ----------
    function renderCard() {
        if (!filteredCards.length || currentIndex < 0) {
            // 无数据时占位
            cardArea.innerText = '——';
            cardCategory.innerText = '——';
            cardProcess.innerText = '暂无过程';
            cardDesc.innerText = '';
            cardEffect.innerText = '';
            progressSpan.innerText = `0/0`;
            detailSection.classList.add('hidden-detail');
            toggleBtn.innerText = '🔎 显示描述&作用';
            return;
        }

        const card = filteredCards[currentIndex];
        cardArea.innerText = card.area;
        cardCategory.innerText = card.category + '过程组';
        cardProcess.innerText = card.process;
        cardDesc.innerText = card.desc;
        // 将作用中的 \n 替换为换行（使用innerHTML + 保留换行）
        // 使用white-space: pre-line，直接设置文本即可
        cardEffect.innerText = card.effect;

        // 更新进度
        progressSpan.innerText = `${currentIndex+1}/${filteredCards.length}`;

        // 根据detailVisible控制详情区域的显示和按钮文字
        if (detailVisible) {
            detailSection.classList.remove('hidden-detail');
            toggleBtn.innerText = '🙈 隐藏描述&作用';
        } else {
            detailSection.classList.add('hidden-detail');
            toggleBtn.innerText = '🔎 显示描述&作用';
        }
    }

    // ---------- 切换详情显示/隐藏 ----------
    function toggleDetail() {
        detailVisible = !detailVisible;
        if (detailVisible) {
            detailSection.classList.remove('hidden-detail');
            toggleBtn.innerText = '🙈 隐藏描述&作用';
        } else {
            detailSection.classList.add('hidden-detail');
            toggleBtn.innerText = '🔎 显示描述&作用';
        }
    }

    // ---------- 导航函数 ----------
    function goPrev() {
        if (filteredCards.length === 0) return;
        currentIndex = (currentIndex - 1 + filteredCards.length) % filteredCards.length;
        detailVisible = false;      // 切换卡片重置隐藏
        renderCard();
    }

    function goNext() {
        if (filteredCards.length === 0) return;
        currentIndex = (currentIndex + 1) % filteredCards.length;
        detailVisible = false;
        renderCard();
    }

    function goRandom() {
        if (filteredCards.length === 0) return;
        const newIdx = Math.floor(Math.random() * filteredCards.length);
        currentIndex = newIdx;
        detailVisible = false;
        renderCard();
    }

    // ---------- 监听筛选变化 ----------
    areaSelect.addEventListener('change', function(e) {
        currentFilter = e.target.value;
        updateFilteredCards();
        renderCard();
    });

    // ---------- 绑定按钮事件 ----------
    toggleBtn.addEventListener('click', toggleDetail);
    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    randomBtn.addEventListener('click', goRandom);

    // ---------- 初始渲染 ----------
    currentFilter = '全部';
    updateFilteredCards();
    renderCard();

    // 添加触摸优化，防止双击误触缩放 (无伤大雅)
})();
</script>
</body>
</html>
